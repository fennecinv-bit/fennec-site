<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fennec Investment - Terminal</title>
    <style>
        :root {
            --gold: #d4af37;
            --bg-dark: #121212;
            --card-bg: #808080;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 20px 20px;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        /* Menu Contrôles (Haut Gauche) */
        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .control-btn {
            background: var(--gold);
            color: black;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85em;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .header { text-align: center; margin-top: 40px; margin-bottom: 20px; }
        .logo-text { color: var(--gold); font-size: 3em; font-weight: 800; letter-spacing: 2px; margin: 0; }

        /* Voyants */
        .lights-container { position: fixed; top: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; }
        .light { width: 60px; height: 60px; border-radius: 50%; border: 3px solid rgba(0,0,0,0.4); opacity: 0.1; transition: 0.4s; }
        .green.active { background-color: #00ff44; opacity: 1; box-shadow: 0 0 30px #00ff44; }
        .red.active { background-color: #ff2200; opacity: 1; box-shadow: 0 0 30px #ff2200; }

        /* Dashboard */
        .dashboard { width: 95%; max-width: 1100px; display: flex; flex-direction: column; align-items: center; }

        .dz-clock { background: var(--card-bg); width: 280px; padding: 20px; margin-bottom: 20px; border-radius: 8px; text-align: center; color: #000; font-weight: bold; }
        .clock-display { font-size: 2em; font-weight: 900; }

        /* Grille adaptative par défaut (PC) */
        .world-clocks { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
            width: 100%; 
            margin-bottom: 30px; 
        }
        .clock-box { background: var(--card-bg); padding: 20px 5px; border-radius: 8px; text-align: center; color: #000; font-weight: bold; }
        .sub-clock-display { font-size: 1.4em; font-weight: 800; }

        /* Checklist */
        .checklist-section { width: 100%; background: rgba(0,0,0,0.6); padding: 25px; border-radius: 12px; border: 2px solid var(--gold); }
        .checklist-item { margin: 12px 0; font-size: 1.1em; display: flex; align-items: center; }
        input[type="checkbox"] { transform: scale(1.5); margin: 0 15px; cursor: pointer; accent-color: var(--gold); }

        .status-msg { margin-top: 20px; font-weight: bold; font-size: 1.2em; text-align: center; padding: 12px; border-radius: 6px; }

        /* CLASSE MOBILE FORCEE */
        body.mobile-view .world-clocks { grid-template-columns: repeat(2, 1fr); }
        body.mobile-view .logo-text { font-size: 1.8em; }
        body.mobile-view .dz-clock { width: 200px; }
        body.mobile-view .lights-container { position: relative; flex-direction: row; top: 0; right: 0; margin-bottom: 20px; }
        body.mobile-view .checklist-item { font-size: 0.9em; }

        /* RTL Support */
        body.rtl { direction: rtl; }
        body.rtl .controls { left: auto; right: 20px; }
        body.rtl .lights-container { right: auto; left: 30px; }
    </style>
</head>
<body class="pc-view">

    <div class="controls">
        <button class="control-btn" onclick="toggleLang()" id="btn-lang">AR / FR</button>
        <button class="control-btn" onclick="toggleView()" id="btn-view">MODE: SMARTPHONE</button>
    </div>

    <div class="lights-container">
        <div id="green-light" class="light green"></div>
        <div id="red-light" class="light red active"></div>
    </div>

    <div class="header">
        <h1 class="logo-text">FENNEC INVESTMENT</h1>
    </div>

    <div class="dashboard">
        <div class="dz-clock">
            <h2 id="txt-dz">DZ TIME</h2>
            <div id="dz-time" class="clock-display">--:--:--</div>
        </div>

        <div class="world-clocks" id="clocks-grid">
            <div class="clock-box"><h3 id="txt-syd">SYDNEY</h3><div id="syd-time" class="sub-clock-display">--:--:--</div></div>
            <div class="clock-box"><h3 id="txt-tok">TOKYO</h3><div id="tok-time" class="sub-clock-display">--:--:--</div></div>
            <div class="clock-box"><h3 id="txt-lon">LONDRES</h3><div id="lon-time" class="sub-clock-display">--:--:--</div></div>
            <div class="clock-box"><h3 id="txt-ny">NY (EST)</h3><div id="ny-time" class="sub-clock-display">--:--:--</div></div>
        </div>

        <div class="checklist-section">
            <h3 id="txt-check-title">🧠 MINDSET & DISCIPLINE</h3>
            <div class="checklist-item"><input type="checkbox" class="check"><span id="c1">Reposé et concentré ?</span></div>
            <div class="checklist-item"><input type="checkbox" class="check"><span id="c2">Plan de trading écrit ?</span></div>
            <div class="checklist-item"><input type="checkbox" class="check"><span id="c3">Setup conforme stratégie ?</span></div>
            <div class="checklist-item"><input type="checkbox" class="check"><span id="c4">Ratio Risque/Gain validé ?</span></div>
            <div id="status-text" class="status-msg">---</div>
        </div>
    </div>

    <script>
        let currentLang = 'fr';
        let isMobileView = false;

        const translations = {
            fr: {
                dz: "DZ TIME", syd: "SYDNEY", tok: "TOKYO", lon: "LONDRES", ny: "NY (EST)",
                title: "🧠 MINDSET & DISCIPLINE",
                c1: "Suis-je reposé et concentré ?",
                c2: "Mon plan de trading est-il prêt et écrit ?",
                c3: "Le setup est-il conforme à ma stratégie ?",
                c4: "Le ratio risque/récompense est-il correct ?",
                ok: "⚡ CONDITIONS PARFAITES : EXÉCUTION AUTORISÉE",
                wait_check: "🛑 DISCIPLINE : CHECKLIST INCOMPLÈTE",
                wait_time: "⏳ TIMING HORS ZONE OPTIMALE",
                view_pc: "MODE: PC", view_mob: "MODE: SMARTPHONE"
            },
            ar: {
                dz: "وقت الجزائر", syd: "سيدني", tok: "طوكيو", lon: "لندن", ny: "نيويورك",
                title: "🧠 العقلية والانضباط",
                c1: "هل أنا مرتاح ومركز؟",
                c2: "هل خطة التداول جاهزة ومكتوبة؟",
                c3: "هل الإعداد مطابق لاستراتيجيتي؟",
                c4: "هل نسبة المخاطرة إلى العائد صحيحة؟",
                ok: "⚡ ظروف مثالية: التنفيذ مسموح",
                wait_check: "🛑 الانضباط: القائمة غير مكتملة",
                wait_time: "⏳ التوقيت غير مناسب",
                view_pc: "وضع الحاسوب", view_mob: "وضع الهاتف"
            }
        };

        function toggleLang() {
            currentLang = (currentLang === 'fr') ? 'ar' : 'fr';
            document.body.classList.toggle('rtl', currentLang === 'ar');
            updateUI();
        }

        function toggleView() {
            isMobileView = !isMobileView;
            document.body.className = isMobileView ? (currentLang === 'ar' ? 'mobile-view rtl' : 'mobile-view') : (currentLang === 'ar' ? 'pc-view rtl' : 'pc-view');
            document.getElementById('btn-view').innerText = isMobileView ? translations[currentLang].view_pc : translations[currentLang].view_mob;
        }

        function updateUI() {
            const t = translations[currentLang];
            document.getElementById('txt-dz').innerText = t.dz;
            document.getElementById('txt-syd').innerText = t.syd;
            document.getElementById('txt-tok').innerText = t.tok;
            document.getElementById('txt-lon').innerText = t.lon;
            document.getElementById('txt-ny').innerText = t.ny;
            document.getElementById('txt-check-title').innerText = t.title;
            document.getElementById('c1').innerText = t.c1;
            document.getElementById('c2').innerText = t.c2;
            document.getElementById('c3').innerText = t.c3;
            document.getElementById('c4').innerText = t.c4;
            document.getElementById('btn-view').innerText = isMobileView ? t.view_pc : t.view_mob;
            evaluateTradeCondition();
        }

        function updateTime() {
            const zones = { "dz-time": "Africa/Algiers", "syd-time": "Australia/Sydney", "tok-time": "Asia/Tokyo", "lon-time": "Europe/London", "ny-time": "America/New_York" };
            for (let id in zones) {
                let timeStr = new Date().toLocaleTimeString("fr-FR", {timeZone: zones[id], hour12: false});
                document.getElementById(id).innerText = timeStr;
            }
            evaluateTradeCondition();
        }

        function evaluateTradeCondition() {
            let nyNow = new Date(new Date().toLocaleString("en-US", {timeZone: "America/New_York"}));
            let timeDecimal = nyNow.getHours() + (nyNow.getMinutes() / 60);
            let isOptimal = (timeDecimal >= 10.5 && timeDecimal <= 12) || (timeDecimal >= 15 && timeDecimal <= 16);
            let allChecked = Array.from(document.querySelectorAll('.check')).every(c => c.checked);

            const t = translations[currentLang];
            let green = document.getElementById('green-light');
            let red = document.getElementById('red-light');
            let statusText = document.getElementById('status-text');

            if (allChecked && isOptimal) {
                green.classList.add('active'); red.classList.remove('active');
                statusText.innerText = t.ok; statusText.style.color = "#00ff44";
            } else {
                green.classList.remove('active'); red.classList.add('active');
                statusText.innerText = !allChecked ? t.wait_check : t.wait_time;
                statusText.style.color = "#ff2200";
            }
        }

        setInterval(updateTime, 1000);
        updateUI();
        document.querySelectorAll('.check').forEach(el => el.addEventListener('change', evaluateTradeCondition));
    </script>
</body>
</html>
